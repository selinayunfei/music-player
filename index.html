<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"
    <title> Music Player Design </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/13dbc08f81.js" crossorigin="anonymous"></script>
</head>

<body>
<div class="container">
    <div class="music-player">
    <nav>
        <div class = "circle">
            <i class="fa-solid fa-angle-left"></i>
        </div>
        <div class = "circle">
            <i class="fa-solid fa-bars"></i>
        </div>
    </nav>
    <img src="media/toro.jpg" class="song-img">
    <h1>Drag Path</h1>
    <p>Twenty One Pilots</p>

    <audio id="song">
        <source src="media/Drag Path.mp3" type = "audio/mpeg">
    </audio>
    <input type="range" value = "0" id = "progress">

    <div class="controls">
        <div><i class="fa-solid fa-backward"></i></div>
        <div onclick = "playPause()">
            <span id="ctrlIcon">
                <i class ="fa-solid fa-play"></i>
            </span>
        </div>
        <div><i class="fa-solid fa-forward"></i></div>
    </div>

    </div>
</div>

<script>
let progress = document.getElementById("progress");
let song = document.getElementById("song");
let ctrlIcon = document.getElementById("ctrlIcon");

song.onloadedmetadata = function(){
    progress.max = song.duration;
    progress.value = song.currentTime;
}

function playPause(){
    if(song.paused){
        song.play();
        ctrlIcon.innerHTML=
            '<i class="fa-solid fa-pause"></i>';
    }
    else{
        song.pause();
        ctrlIcon.innerHTML=
            '<i class="fa-solid fa-play"></i>';
    }
}

if(song.play()){
    setInterval(()=>{
        progress.value = song.currentTime;
    },500);
}

progress.onchange = function(){
    song.play();
    song.currentTime = progress.value;
    ctrlIcon.innerHTML=
            '<i class="fa-solid fa-pause"></i>';
}

</script>




</body>

</html>
