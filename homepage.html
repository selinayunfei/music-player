<!--
    File Name: homepage.html
    Description: Main landing page, for song selection. 
-->

<!DOCTYPE html>

<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>home page</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
        <script src="https://kit.fontawesome.com/13dbc08f81.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <div class="container">
            <div class="music-home-page">

                <!-- title with stars decor -->
                <div class="top">
                    <h2 class ="custom-font">home !</h2>
                    <img src="media/decor 1.png" class="decor">
                </div>

                <!-- row of artists' profiles, opens to song-->
                <p> <b>artists</b> </p>

                <div class = "row">
                    <div class="column">
                        <img src="media/artist profiles/21 pilots.png" class="artist-img" style="width:100%" onclick="openSong(0)">
                    </div>
                    <div class="column">
                        <img src="media/artist profiles/yena.png" class="artist-img" style="width:100%" onclick="openSong(2)">
                    </div>
                    <div class="column">
                        <img src="media/artist profiles/malcolm todd.png" class="artist-img" style="width:100%" onclick="openSong(4)">
                    </div>
                    <div class="column">
                        <img src="media/artist profiles/itzy.png" class="artist-img" style="width:100%" onclick="openSong(3)">
                    </div>
                </div>
                
                <!-- list of songs (playlists), rectangles as buttons that opens to song-->
                <p><b>playlist</b></p>

                    <div class="rectangle" onclick="openSong(0)">
                        <div class ="icon"><i class="fa-solid fa-compact-disc"></i></div>

                        <div class="song-info">
                            <p class = "song-title">Drag path</p>
                            <p class = "artist-name">Twenty One Pilots</p>
                        </div>
                    </div>

                <div class="rectangle" onclick="openSong(1)">
                    <div class ="icon"><i class="fa-solid fa-compact-disc"></i></div>
                    <div class="song-info">
                        <p class = "song-title">Let Down</p>
                        <p class = "artist-name">Radiohead</p>
                    </div>
                </div>

                <div class="rectangle" onclick="openSong(2)">
                    <div class ="icon"><i class="fa-solid fa-compact-disc"></i></div>
                    <div class="song-info">
                        <p class = "song-title">Catch Catch</p>
                        <p class = "artist-name">Yena</p>
                    </div>
                </div>

                <div class="rectangle" onclick="openSong(3)">
                    <div class ="icon"><i class="fa-solid fa-compact-disc"></i></div>
                    <div class="song-info">
                        <p class = "song-title">That's A No No</p>
                        <p class = "artist-name">ITZY</p>
                    </div>
                </div>

                <div class="rectangle" onclick="openSong(4)">
                    <div class ="icon"><i class="fa-solid fa-compact-disc"></i></div>
                    <div class="song-info">
                        <p class = "song-title">Bleed</p>
                        <p class = "artist-name">Malcolm Todd, Omar Apollo</p>
                    </div>
                </div>

            </div> <!--music-home-page end-->
        </div> <!--container end-->

    
    <script>
        // function to open song, to musicplayer page
        function openSong(index){
            localStorage.setItem("index", index)
            
            window.location.href ="musicplayer.html";
        }
    </script>   

    </body>
</html>
