<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> music !</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://kit.fontawesome.com/13dbc08f81.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="music-player">
        <nav>
            <a href="homepage.html" class="button-link">
                <div class = "circle">
                    <i class="fa-solid fa-angle-left"></i>
                </div>
            </a>
            <div class = "circle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>

        <div class="record-conatiner">
            <img src="media/vinyl.jpg" id="vinyl" class="song-img">
            <img id="cover-file" class="album-img">
        </div>


        <div class="moving-container">
            <p class = "moving-title"><b id="title"></b>&emsp;&emsp;<span id="artist"></span></p>
        </div>
        
        <audio id="song-file"></audio>

        <input type="range" value = "0" id = "progress">

        <div class="controls">
            <div onclick="previousSong()">
                <i class="fa-solid fa-backward"></i>
            </div>

            <div onclick = "playPause()">
                <span id="ctrlIcon">
                    <i class ="fa-solid fa-play"></i>
                </span>
            </div>

            <div onclick="nextSong()">
                <i class="fa-solid fa-forward"></i>
            </div>
        </div>

        </div>
    </div>

    <script>
    const songs = [
    {
        title: "Drag Path",
        artist: "Twenty One Pilots",
        file: "media/Drag Path.mp3",
        cover: "media/covers/dragpath cover.png"
    },

    {
        title: "Let Down",
        artist: "Radiohead",
        file: "media/Let Down.mp3",
        cover: "media/covers/letdown cover.png"
    },

    {
        title: "Catch Catch",
        artist: "Yena",
        file: "media/Catch Catch.mp3",
        cover: "media/covers/catchcatch cover.png"
    },

    {
        title: "That's A No No",
        artist: "ITZY",
        file: "media/Thats A No No.mp3",
        cover: "media/covers/nono cover.png"
    },

    {
        title: "Bleed",
        artist: "Malcolm Todd, Omar Apollo",
        file: "media/Bleed.mp3",
        cover: "media/covers/bleed cover.png"
    }
    ];

    let progress = document.getElementById("progress");

    let current = Number(localStorage.getItem("index")) || 0;

    let song = document.getElementById("song-file");

    let ctrlIcon = document.getElementById("ctrlIcon");
    const disc = document.getElementById("vinyl");

    function loadSong(){
        song.src=songs[current].file;

        document.getElementById("title").textContent=
            songs[current].title;

        document.getElementById("artist").textContent=
            songs[current].artist;

        document.getElementById("cover-file").src=
            songs[current].cover;

        song.load();
        ctrlIcon.innerHTML = '<i class="fa-solid fa-play"></i>';
    }

    loadSong();

    song.onloadedmetadata = function(){
        progress.max = song.duration;
        progress.value = song.currentTime;
    }

    function playPause(){
        if(song.paused){
            song.play();
            ctrlIcon.innerHTML=
                '<i class="fa-solid fa-pause"></i>';
                disc.classList.add('is-spinning');
        }
        else{
            song.pause();
            ctrlIcon.innerHTML=
                '<i class="fa-solid fa-play"></i>';
                disc.classList.remove('is-spinning');
        }
    }

    function previousSong(){
        current--;
        
        if(current<0){
            current =
                songs.length -1; 
        }

        localStorage.setItem("index",current);

        loadSong();
        song.play();
        ctrlIcon.innerHTML =
        '<i class="fa-solid fa-pause"></i>';
    }

    function nextSong(){
        current++;

        if(current >= songs.length){
            current = 0;
        }

        localStorage.setItem("index",current);

        loadSong();
        song.play();
        ctrlIcon.innerHTML =
        '<i class="fa-solid fa-pause"></i>';

    }

    song.addEventListener("timeupdate", function(){
        progress.value = song.currentTime;
    });

    progress.oninput = function(){
        song.currentTime = progress.value;
    }

    </script>




</body>

</html>
